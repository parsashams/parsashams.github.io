<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Visual Chess Repertoire Coach</title>
<style>
:root{--page:#f6f1e8;--paper:#fffdf8;--ink:#28231b;--muted:#6d6458;--line:#d8cbbb;--accent:#315f8f;--accent2:#5b7f2a;--note:#e9f1fb;--warn:#fae9e6;--light:#f0d9b5;--dark:#b58863;--last:rgba(255,219,77,.58)}
*{box-sizing:border-box} body{margin:0;background:var(--page);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;line-height:1.5} header{padding:30px 20px;background:linear-gradient(135deg,#fff9ed,#eadfce);border-bottom:1px solid var(--line)} h1{margin:0 0 8px;font-size:clamp(1.8rem,3vw,3rem)} header p{margin:0;color:var(--muted);max-width:980px}.wrap{max-width:1180px;margin:0 auto;padding:22px 14px 70px} nav{position:sticky;top:0;z-index:5;background:rgba(255,253,248,.95);backdrop-filter:blur(8px);padding:10px 14px;border-bottom:1px solid var(--line);overflow:auto;white-space:nowrap}nav a{display:inline-block;margin-right:8px;padding:7px 11px;border:1px solid var(--line);border-radius:999px;text-decoration:none;color:var(--ink);background:#fff8ea}nav a:hover{border-color:var(--accent);color:var(--accent)} section{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 14px 34px rgba(73,50,27,.12);padding:20px;margin:20px 0 32px} h2{margin:0 0 8px;font-size:1.65rem} h3{margin:0 0 8px;color:var(--accent)} code,pre{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}pre{background:#fbf6ec;border:1px solid var(--line);border-radius:12px;padding:11px;overflow:auto}.tag{font-size:.78rem;background:var(--accent);color:white;border-radius:999px;padding:3px 8px;margin-left:8px}.lead{color:var(--muted);margin:0 0 14px}.lesson{display:grid;grid-template-columns:minmax(260px,360px) 1fr;gap:16px;align-items:start;margin:18px 0;padding:14px;background:#fffaf0;border:1px solid var(--line);border-radius:15px}@media(max-width:760px){.lesson{grid-template-columns:1fr}}.boardBox{width:min(100%,350px);margin:auto}.board{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));grid-template-rows:repeat(8,minmax(0,1fr));width:100%;aspect-ratio:1/1;border:2px solid #5c4530;border-radius:10px;overflow:hidden;background:var(--light)}.sq{width:100%;height:100%;min-width:0;min-height:0;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;font-size:clamp(21px,5.2vw,37px);line-height:1}.l{background:var(--light)}.d{background:var(--dark)}.last{box-shadow:inset 0 0 0 999px var(--last)}.coord{position:absolute;font-size:10px;font-weight:800;color:rgba(25,20,15,.55);pointer-events:none}.rank{top:2px;left:4px}.file{bottom:2px;right:4px}.white{color:#fffaf0;text-shadow:0 1px 2px rgba(0,0,0,.65)}.black{color:#17130f}.controls{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 8px}button{border:1px solid #cdbda7;background:#fff8ea;color:var(--ink);border-radius:9px;padding:8px 11px;cursor:pointer;font-weight:700}button:hover{border-color:var(--accent);color:var(--accent)}button.primary{background:#e7f0fb;border-color:#adcbe8;color:#17476f}.moves{display:flex;flex-wrap:wrap;gap:6px}.pill{background:#fffdf8;border:1px solid #d8c9b4;border-radius:999px;padding:4px 8px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.86rem;cursor:pointer}.pill.active{background:#edf5e5;border-color:var(--accent2);color:#34550e;font-weight:800}.note,.mnemonic,.danger{border-radius:12px;padding:11px 13px;margin:10px 0}.note{background:var(--note);border:1px solid #c9def2}.mnemonic{background:#edf5e5;border:1px solid #c9ddb6}.danger{background:var(--warn);border:1px solid #edc8c1}.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}@media(max-width:700px){.cards{grid-template-columns:1fr}}.card{background:#fffaf0;border:1px solid var(--line);border-radius:14px;padding:14px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}th{color:var(--accent)}
</style>
</head>
<body>
<header><h1>Visual Chess Repertoire Coach</h1><p>Every notation line is paired with an interactive board. Click <b>Next</b>, <b>Previous</b>, or any move pill to see the position change.</p></header>
<nav id="nav"></nav><main class="wrap" id="app"></main>
<script>
const P={P:'♙',N:'♘',B:'♗',R:'♖',Q:'♕',K:'♔',p:'♟',n:'♞',b:'♝',r:'♜',q:'♛',k:'♚'};
const DATA=[
{id:'principles',title:'Core operating system',lead:'At your rating, the best repertoire creates repeatable positions and reduces early tactical accidents.',intro:`<div class="cards"><div class="card"><h3>White</h3><p><b>Develop → castle → prepare d4.</b></p><div class="mnemonic"><b>BCRD:</b> Bishop out, Castle, Rook e1, d4 break.</div></div><div class="card"><h3>Black</h3><p><b>Build a pawn shell → develop → attack the center.</b></p><div class="mnemonic"><b>Triangle:</b> c6–d5–e6 in the Caro-Kann.<br><b>Pillbox:</b> d5–e6 against d4.</div></div></div><div class="danger"><b>Personal rule:</b> no queen move before move 8 unless it wins material, prevents mate, or is a forced recapture.</div>`,lessons:[]},
{id:'white-e5',title:'White vs 1...e5',tag:'Italian Game',lead:'Your main White weapon. It teaches normal development and gives a clear central break.',lessons:[
{name:'Main line: Italian structure',line:'e4 e5 Nf3 Nc6 Bc4 Bc5 O-O Nf6 Re1 O-O c3 d6 d4',notation:'1. e4 e5\n2. Nf3 Nc6\n3. Bc4 Bc5\n4. O-O Nf6\n5. Re1 O-O\n6. c3 d6\n7. d4',plan:'Bishop out, castle, rook to e1, support center with c3, then break with d4.',memory:'BCRD — Bishop, Castle, Rook, d4.'},
{name:'Branch: black plays 3...Nf6',line:'e4 e5 Nf3 Nc6 Bc4 Nf6 d3 Be7 O-O O-O Re1 d6 c3',notation:'1. e4 e5\n2. Nf3 Nc6\n3. Bc4 Nf6\n4. d3 Be7\n5. O-O O-O\n6. Re1 d6\n7. c3',plan:'Play calmly. Do not go pawn-hunting. Build the same Italian shell.'},
{name:'Branch: Petroff, 2...Nf6',line:'e4 e5 Nf3 Nf6 Nc3 Nc6 Bc4 Bc5 O-O',notation:'1. e4 e5\n2. Nf3 Nf6\n3. Nc3 Nc6\n4. Bc4 Bc5\n5. O-O',plan:'Use Nc3 to avoid needing Petroff theory. Then return to normal development.'}]},
{id:'white-sicilian',title:'White vs Sicilian',lead:'Clean rule: play Nf3 and d4. Avoid early queen checks or Qh5 ideas.',lessons:[
{name:'Main line: open the center',line:'e4 c5 Nf3 Nc6 d4 cxd4 Nxd4 Nf6 Nc3 d6 Be2',notation:'1. e4 c5\n2. Nf3 Nc6\n3. d4 cxd4\n4. Nxd4 Nf6\n5. Nc3 d6\n6. Be2',plan:'Open the center, recapture with the knight, develop pieces, castle.',memory:'Open the center.'},
{name:'Branch: 2...d6',line:'e4 c5 Nf3 d6 d4 cxd4 Nxd4 Nf6 Nc3 a6 Be2',notation:'1. e4 c5\n2. Nf3 d6\n3. d4 cxd4\n4. Nxd4 Nf6\n5. Nc3 a6\n6. Be2',plan:'Same plan. If black plays slow pawn moves, you develop and castle.'},
{name:'Branch: 2...e6',line:'e4 c5 Nf3 e6 d4 cxd4 Nxd4 Nf6 Nc3 Bb4 Bd3',notation:'1. e4 c5\n2. Nf3 e6\n3. d4 cxd4\n4. Nxd4 Nf6\n5. Nc3 Bb4\n6. Bd3',plan:'If pinned by ...Bb4, defend with Bd3 and prepare castling.'},
{name:'Backup: closed setup',line:'e4 c5 Nc3 Nc6 g3 g6 Bg2 Bg7 d3 d6 Nge2',notation:'1. e4 c5\n2. Nc3 Nc6\n3. g3 g6\n4. Bg2 Bg7\n5. d3 d6\n6. Nge2',plan:'Use this when Open Sicilian positions feel too much. Slower, but easier to remember.'}]},
{id:'white-french',title:'White vs French',lead:'The French is about space. Take space first, then develop behind the pawn chain.',lessons:[
{name:'Branch: 3...Nf6',line:'e4 e6 d4 d5 Nc3 Nf6 e5 Nfd7 Nf3 c5 Be3',notation:'1. e4 e6\n2. d4 d5\n3. Nc3 Nf6\n4. e5 Nfd7\n5. Nf3 c5\n6. Be3',plan:'Push e5, develop, support d4, and castle.',memory:'Space first.'},
{name:'Branch: 3...Bb4, Winawer',line:'e4 e6 d4 d5 Nc3 Bb4 e5 c5 a3 Bxc3+ bxc3',notation:'1. e4 e6\n2. d4 d5\n3. Nc3 Bb4\n4. e5 c5\n5. a3 Bxc3+\n6. bxc3',plan:'Do not panic about the pin. Take space with e5; if black trades, accept doubled pawns and play actively.'},
{name:'Branch: black exchanges',line:'e4 e6 d4 d5 Nc3 dxe4 Nxe4 Nf6 Nxf6+ Qxf6 Nf3',notation:'1. e4 e6\n2. d4 d5\n3. Nc3 dxe4\n4. Nxe4 Nf6\n5. Nxf6+ Qxf6\n6. Nf3',plan:'Recapture with the knight, trade if useful, and keep developing.'}]},
{id:'white-scandi',title:'White vs Scandinavian',lead:'Take the pawn, attack the queen with development, then stop chasing.',lessons:[
{name:'Main line: queen to a5',line:'e4 d5 exd5 Qxd5 Nc3 Qa5 d4 Nf6 Nf3 c6 Bc4',notation:'1. e4 d5\n2. exd5 Qxd5\n3. Nc3 Qa5\n4. d4 Nf6\n5. Nf3 c6\n6. Bc4',plan:'Nc3 is a developing tempo. Then build the center with d4.'},
{name:'Branch: queen retreats to d8',line:'e4 d5 exd5 Qxd5 Nc3 Qd8 d4 Nf6 Nf3 e6 Bc4',notation:'1. e4 d5\n2. exd5 Qxd5\n3. Nc3 Qd8\n4. d4 Nf6\n5. Nf3 e6\n6. Bc4',plan:'Black wasted time. Do not chase. Develop normally.'},
{name:'Branch: queen to d6',line:'e4 d5 exd5 Qxd5 Nc3 Qd6 d4 Nf6 Nf3 a6 Bc4',notation:'1. e4 d5\n2. exd5 Qxd5\n3. Nc3 Qd6\n4. d4 Nf6\n5. Nf3 a6\n6. Bc4',plan:'Build the center and develop. The queen is not your target anymore.'}]},
{id:'black-caro',title:'Black vs 1.e4',tag:'Caro-Kann',lead:'This replaces scattered 1...e5 games with a stable structure you can recognize.',lessons:[
{name:'Main line: Classical Caro structure',line:'e4 c6 d4 d5 Nc3 dxe4 Nxe4 Bf5 Ng3 Bg6 Nf3 e6 Be2 Nd7 O-O Ngf6',notation:'1. e4 c6\n2. d4 d5\n3. Nc3 dxe4\n4. Nxe4 Bf5\n5. Ng3 Bg6\n6. Nf3 e6\n7. Be2 Nd7\n8. O-O Ngf6',plan:'c6–d5 first, bishop outside the pawn chain, then e6 and development.',memory:'Triangle first, bishop outside, then e6.'},
{name:'Branch: Advance Variation',line:'e4 c6 d4 d5 e5 Bf5 Nf3 e6 Be2 c5 O-O Nc6',notation:'1. e4 c6\n2. d4 d5\n3. e5 Bf5\n4. Nf3 e6\n5. Be2 c5\n6. O-O Nc6',plan:'Attack the base of White’s pawn chain: the d4 pawn.'},
{name:'Branch: Exchange Variation',line:'e4 c6 d4 d5 exd5 cxd5 Nf3 Nc6 Bd3 Nf6 O-O Bg4',notation:'1. e4 c6\n2. d4 d5\n3. exd5 cxd5\n4. Nf3 Nc6\n5. Bd3 Nf6\n6. O-O Bg4',plan:'Symmetrical structure. Develop pieces and look for pressure on d4.'},
{name:'Branch: White pushes kingside pawns',line:'e4 c6 d4 d5 e5 Bf5 h4 h6 g4 Bd7',notation:'1. e4 c6\n2. d4 d5\n3. e5 Bf5\n4. h4 h6\n5. g4 Bd7',plan:'Do not panic. Step the bishop back and strike the center with ...c5 soon.'}]},
{id:'black-d4',title:'Black vs 1.d4',lead:'Use a Queen’s Gambit Declined / Slav family shell: d5, e6, Nf6, Be7, castle.',lessons:[
{name:'Main line: QGD shell',line:'d4 d5 c4 e6 Nc3 Nf6 Nf3 Be7 Bg5 O-O e3 h6 Bh4 b6',notation:'1. d4 d5\n2. c4 e6\n3. Nc3 Nf6\n4. Nf3 Be7\n5. Bg5 O-O\n6. e3 h6\n7. Bh4 b6',plan:'Hold the center, castle, then decide between ...c5 or ...b6.',memory:'Pillbox — d5 + e6 + Nf6 + Be7 + castle.'},
{name:'Branch: London System',line:'d4 d5 Bf4 Nf6 e3 e6 Nf3 c5 c3 Nc6 Bd3 Bd6',notation:'1. d4 d5\n2. Bf4 Nf6\n3. e3 e6\n4. Nf3 c5\n5. c3 Nc6\n6. Bd3 Bd6',plan:'Hit the center with ...c5. Do not let White get a free setup.'},
{name:'Branch: White skips c4 early',line:'d4 d5 Nf3 Nf6 e3 e6 Bd3 Be7 O-O O-O c4 c5',notation:'1. d4 d5\n2. Nf3 Nf6\n3. e3 e6\n4. Bd3 Be7\n5. O-O O-O\n6. c4 c5',plan:'Mirror development, castle, then challenge the center with ...c5.'},
{name:'Branch: Exchange structure',line:'d4 d5 c4 e6 Nc3 Nf6 cxd5 exd5 Bg5 Be7 e3 O-O',notation:'1. d4 d5\n2. c4 e6\n3. Nc3 Nf6\n4. cxd5 exd5\n5. Bg5 Be7\n6. e3 O-O',plan:'Recapture with the e-pawn, develop, castle. Later watch for queenside minority attacks.'}]},
{id:'checklists',title:'Execution tools',lead:'Use these during the opening and before every tactical decision.',intro:`<div class="cards"><div class="card"><h3>CCT</h3><ul><li><b>Checks:</b> what checks exist?</li><li><b>Captures:</b> what can be taken?</li><li><b>Threats:</b> what is attacked next?</li></ul></div><div class="card"><h3>LPDO</h3><p><b>Loose Pieces Drop Off.</b> Undefended pieces become tactics.</p></div><div class="card"><h3>KISS</h3><ul><li><b>K:</b> King safe</li><li><b>I:</b> Improve worst piece</li><li><b>S:</b> Space</li><li><b>S:</b> Stop counterplay</li></ul></div><div class="card"><h3>Rescue rule</h3><ol><li>Develop a piece.</li><li>Castle.</li><li>Fight for the center.</li><li>Do not move the queen early.</li></ol></div></div><h3>Memory table</h3><table><thead><tr><th>Situation</th><th>Your plan</th><th>Phrase</th></tr></thead><tbody><tr><td>White vs ...e5</td><td>Italian: Bc4, castle, Re1, c3, d4</td><td>BCRD</td></tr><tr><td>White vs Sicilian</td><td>Nf3 and d4</td><td>Open the center</td></tr><tr><td>White vs French</td><td>d4, Nc3, e5 if attacked</td><td>Space first</td></tr><tr><td>White vs Scandinavian</td><td>exd5, Nc3, develop</td><td>Tempo development</td></tr><tr><td>Black vs e4</td><td>Caro-Kann: c6, d5, Bf5, e6</td><td>Triangle</td></tr><tr><td>Black vs d4</td><td>d5, e6, Nf6, Be7, castle</td><td>Pillbox</td></tr></tbody></table>`,lessons:[]}
];
function init(){document.getElementById('nav').innerHTML=DATA.map(s=>`<a href="#${s.id}">${s.title}</a>`).join('');document.getElementById('app').innerHTML=DATA.map(section).join('');document.querySelectorAll('.board').forEach(initBoard)}
function section(s){return `<section id="${s.id}"><h2>${s.title}${s.tag?` <span class="tag">${s.tag}</span>`:''}</h2><p class="lead">${s.lead||''}</p>${s.intro||''}${(s.lessons||[]).map(lesson).join('')}</section>`}
function lesson(x){return `<div class="lesson"><div class="boardBox"><div class="board" data-line="${x.line}"></div><div class="controls"></div><div class="moves"></div></div><div><h3>${x.name}</h3><pre>${x.notation}</pre><p><b>Plan:</b> ${x.plan}</p>${x.memory?`<div class="mnemonic"><b>Memory:</b> ${x.memory}</div>`:''}</div></div>`}
function start(){return [['r','n','b','q','k','b','n','r'],['p','p','p','p','p','p','p','p'],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['','','','','','','',''],['P','P','P','P','P','P','P','P'],['R','N','B','Q','K','B','N','R']]}
const clone=b=>b.map(r=>r.slice()), sq=s=>[8-parseInt(s[1]),s.charCodeAt(0)-97], name=(r,c)=>String.fromCharCode(97+c)+(8-r), W=p=>p&&p===p.toUpperCase(), B=p=>p&&p===p.toLowerCase(), same=(a,b)=>a&&b&&((W(a)&&W(b))||(B(a)&&B(b)));
function clear(b,fr,fc,tr,tc){let dr=Math.sign(tr-fr),dc=Math.sign(tc-fc),r=fr+dr,c=fc+dc;while(r!==tr||c!==tc){if(b[r][c])return false;r+=dr;c+=dc}return true}
function legal(b,fr,fc,tr,tc,p,cap){let t=b[tr][tc];if(same(p,t))return false;if(cap&&!t)return false;let dr=tr-fr,dc=tc-fc,ar=Math.abs(dr),ac=Math.abs(dc),q=p.toLowerCase(),dir=W(p)?-1:1,home=W(p)?6:1;if(q==='p'){if(dc===0&&!t&&(dr===dir||(fr===home&&dr===2*dir&&!b[fr+dir][fc])))return true;return ac===1&&dr===dir&&!!t}if(q==='n')return(ar===2&&ac===1)||(ar===1&&ac===2);if(q==='b')return ar===ac&&clear(b,fr,fc,tr,tc);if(q==='r')return(dr===0||dc===0)&&clear(b,fr,fc,tr,tc);if(q==='q')return(ar===ac||dr===0||dc===0)&&clear(b,fr,fc,tr,tc);if(q==='k')return ar<=1&&ac<=1;return false}
function find(b,m,white){let raw=m.replace(/[+#?!]/g,'').replace(/=/g,'').trim();if(raw==='O-O'||raw==='0-0')return white?{from:'e1',to:'g1',castle:1}:{from:'e8',to:'g8',castle:1};if(raw==='O-O-O'||raw==='0-0-0')return white?{from:'e1',to:'c1',castle:2}:{from:'e8',to:'c8',castle:2};let dm=raw.match(/([a-h][1-8])/);if(!dm)return null;let dest=dm[1],[tr,tc]=sq(dest),pt=/^[KQRBN]/.test(raw)?raw[0]:'P',cap=raw.includes('x'),before=raw.slice(0,raw.indexOf(dest)),dis=before.replace(/^[KQRBN]/,'').replace('x','');if(pt==='P'&&cap&&/^[a-h]/.test(raw))dis=raw[0];for(let r=0;r<8;r++)for(let c=0;c<8;c++){let p=b[r][c];if(!p||(white&&!W(p))||(!white&&!B(p))||p.toUpperCase()!==pt)continue;let f=name(r,c);if(dis){if(dis.length===1){if(/[a-h]/.test(dis)&&f[0]!==dis)continue;if(/[1-8]/.test(dis)&&f[1]!==dis)continue}else if(f!==dis)continue}if(legal(b,r,c,tr,tc,p,cap))return{from:f,to:dest}}console.warn('Unparsed move',m);return null}
function apply(b,m,white){let mv=find(b,m,white),x=clone(b);if(!mv)return{b:x,mv:null};let[fr,fc]=sq(mv.from),[tr,tc]=sq(mv.to),p=x[fr][fc];x[tr][tc]=p;x[fr][fc]='';if(mv.castle&&mv.to==='g1'){x[7][5]=x[7][7];x[7][7]=''}if(mv.castle&&mv.to==='c1'){x[7][3]=x[7][0];x[7][0]=''}if(mv.castle&&mv.to==='g8'){x[0][5]=x[0][7];x[0][7]=''}if(mv.castle&&mv.to==='c8'){x[0][3]=x[0][0];x[0][0]=''}return{b:x,mv}}
function states(line){let moves=line.split(/\s+/).filter(Boolean),b=start(),out=[{b:clone(b),mv:null}],white=true;for(let m of moves){let r=apply(b,m,white);b=r.b;out.push({b:clone(b),mv:r.mv});white=!white}return{moves,out}}
function draw(el,state){el.innerHTML='';let f=state.mv&&state.mv.from,t=state.mv&&state.mv.to;for(let r=0;r<8;r++)for(let c=0;c<8;c++){let s=name(r,c),d=document.createElement('div');d.className=`sq ${(r+c)%2?'d':'l'} ${(s===f||s===t)?'last':''}`;if(c===0)d.innerHTML+=`<span class="coord rank">${8-r}</span>`;if(r===7)d.innerHTML+=`<span class="coord file">${String.fromCharCode(97+c)}</span>`;let p=state.b[r][c];if(p)d.innerHTML+=`<span class="${W(p)?'white':'black'}">${P[p]}</span>`;el.appendChild(d)}}
function initBoard(el){let {moves,out}=states(el.dataset.line),i=0,box=el.parentElement,controls=box.querySelector('.controls'),ml=box.querySelector('.moves');controls.innerHTML='<button>← Previous</button><button class="primary">Next →</button><button>Reset</button>';let [prev,next,reset]=controls.querySelectorAll('button');function refresh(){draw(el,out[i]);[...ml.children].forEach((p,j)=>p.classList.toggle('active',j===i-1))}prev.onclick=()=>{i=Math.max(0,i-1);refresh()};next.onclick=()=>{i=Math.min(out.length-1,i+1);refresh()};reset.onclick=()=>{i=0;refresh()};moves.forEach((m,j)=>{let p=document.createElement('span');p.className='pill';p.textContent=(j%2===0?Math.floor(j/2)+1+'. ':'')+m;p.onclick=()=>{i=j+1;refresh()};ml.appendChild(p)});refresh()}
init();
</script>
</body>
</html>
